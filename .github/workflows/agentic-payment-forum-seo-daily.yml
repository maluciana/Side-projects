name: Agentic Payment Forum SEO Pipeline

on:
  schedule:
    - cron: '17 15 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd agentic-payment-forum-seo-agent
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          cd agentic-payment-forum-seo-agent
          python main.py
